<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvation Thread - 救済の光 -</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 背景レイヤー（フェーズ2） -->
        <div id="visual-layer">
            <div id="scrolling-bg">
                <div class="bg-section" id="bg-heaven" style="background-image: url('assets/bg_heaven.png');"></div>
                <div class="bg-section" id="bg-sky" style="background-image: url('assets/bg_sky.png');"></div>
                <div class="bg-section" id="bg-hell" style="background-image: url('assets/bg_hell.png');"></div>
            </div>
            <div id="light-thread"></div>
            <div id="player-character"></div>
        </div>

        <!-- スタート画面 -->
        <div id="start-screen">
            <h1 id="game-title">Salvation Thread<br><span class="subtitle">- 救済の光 -</span></h1>
            <p class="start-instruction">ステージを選択してください</p>
            <div class="stage-buttons">
                <button class="stage-btn" data-stage="bible">聖書</button>
                <button class="stage-btn" data-stage="spirit">聖霊の経緯</button>
                <button class="stage-btn" data-stage="galaxy">Galaxy</button>
                <button id="open-creator-btn" class="stage-btn" style="border-color: #4a90e2; margin-top: 10px;">問題を作る</button>
            </div>
        </div>

        <!-- 問題作成画面 -->
        <div id="creator-screen" class="hidden">
            <div class="glass-panel creator-panel">
                <h2 id="creator-title">問題を作成する</h2>
                <div class="input-group">
                    <label>問題文</label>
                    <textarea id="new-q-text" placeholder="問題を入力してください"></textarea>
                </div>
                <div class="input-group">
                    <label>選択肢 (A〜D)</label>
                    <input type="text" id="new-q-a" placeholder="選択肢 A">
                    <input type="text" id="new-q-b" placeholder="選択肢 B">
                    <input type="text" id="new-q-c" placeholder="選択肢 C">
                    <input type="text" id="new-q-d" placeholder="選択肢 D">
                </div>
                <div class="input-group">
                    <label>正解を選択</label>
                    <div class="answer-tabs">
                        <input type="radio" name="correct-ans" value="0" id="ans0" checked><label for="ans0">A</label>
                        <input type="radio" name="correct-ans" value="1" id="ans1"><label for="ans1">B</label>
                        <input type="radio" name="correct-ans" value="2" id="ans2"><label for="ans2">C</label>
                        <input type="radio" name="correct-ans" value="3" id="ans3"><label for="ans3">D</label>
                    </div>
                </div>
                <div class="input-group">
                    <label>ジャンル</label>
                    <select id="new-q-genre">
                        <option value="bible">聖書</option>
                        <option value="spirit">聖霊の経緯</option>
                        <option value="galaxy">Galaxy</option>
                    </select>
                </div>
                <div class="creator-buttons">
                    <button id="register-q-btn" class="stage-btn">登録する</button>
                    <button id="back-to-home-btn" class="stage-btn">キャンセル</button>
                </div>
            </div>
        </div>

        <!-- 進行度とタイマー -->
        <header id="game-header" style="display: none;">
            <div class="progress-bar-container">
                <div class="progress-label">HEAVEN</div>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>
        </header>

        <!-- メイン画面（クイズ表示） -->
        <main id="quiz-section" style="display: none;">
            <div id="question-container" class="glass-panel">
                <h2 id="question-text">ここに問題が表示されます。</h2>
            </div>
            
            <div id="choices-container">
                <!-- 選択肢ボタンがJSで生成されます -->
            </div>
        </main>

        <!-- フッター（ライフ表示など） -->
        <footer id="game-footer" style="display: none;">
            <div id="life-container">
                <!-- 十字架のライフアイコン -->
                <span class="life-icon">✝️</span>
                <span class="life-icon">✝️</span>
                <span class="life-icon">✝️</span>
            </div>
        </footer>

        <!-- 正誤判定のオーバーレイ -->
        <div id="feedback-overlay" class="hidden">
            <div id="feedback-text"></div>
            <div id="result-buttons" class="hidden">
                <button id="retry-btn" class="stage-btn">もう一度挑戦</button>
                <button id="home-btn" class="stage-btn">ホームに戻る</button>
            </div>
        </div>
    </div>

    <script src="js/quiz-data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
